- name: Install WireGuard
  ansible.builtin.apt:
    name: wireguard-tools
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install iptables for NAT and forwarding
  ansible.builtin.apt:
    name: iptables
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable IP forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    sysctl_set: true
    reload: true

- name: Enable IPv6 forwarding
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    state: present
    sysctl_set: true
    reload: true
  failed_when: false

- name: Deploy WireGuard config
  ansible.builtin.template:
    src: wg.conf.j2
    dest: "/etc/wireguard/{{ item.interface }}.conf"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ wireguard_environments }}"
  when: wireguard_environments | length > 0
  notify: Restart WireGuard interfaces

- name: Ensure WireGuard interface is up
  ansible.builtin.systemd:
    name: "wg-quick@{{ item.interface }}"
    state: started
    enabled: true
    daemon_reload: true
  loop: "{{ wireguard_environments }}"
  when: wireguard_environments | length > 0
