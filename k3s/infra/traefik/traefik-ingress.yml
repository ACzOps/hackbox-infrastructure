---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`traefik.k3s.hackbox.cc`)
    kind: Rule
    services:
    - name: api@internal
      kind: TraefikService
  tls: {} # Right cert is in TLSStore already as default
